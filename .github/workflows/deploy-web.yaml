name: Deploy Web

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Portainer www Redeploy
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.PORTAINER_WEBHOOK_WWW }}")
          if [ "$response" -ne 200 ] && [ "$response" -ne 204 ]; then
            echo "Webhook failed with status: $response"
            exit 1
          fi
          echo "Deployment triggered successfully"
      - name: Trigger Portainder docs Redeploy
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.PORTAINER_WEBHOOK_DOCS }}")
          if [ "$response" -ne 200 ] && [ "$response" -ne 204 ]; then
            echo "Webhook failed with status: $response"
            exit 1
          fi
          echo "Deployment triggered successfully"
